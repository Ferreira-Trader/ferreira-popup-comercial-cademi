<script>
(function () {
  var STORAGE_KEY = 'wpp_popup_closed';
  var DELAY_MS = 5000;
  var WPP_URL = 'https://wa.me/5521923670493?text=Ol%C3%A1%2C%20tudo%20bem%3F%0AQuero%20conhecer%20o%20meu%20estrategista%20exclusivo.';
  var WPP_SVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';

  function init() {
    // Injeta CSS
    var s = document.createElement('style');
    s.textContent = [
      '.wpp-popup-overlay{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;margin:0!important;padding:0!important;background:rgba(0,0,0,.7)!important;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:2147483647!important;display:flex!important;align-items:center!important;justify-content:center!important;opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s ease}',
      '.wpp-popup-overlay.active{opacity:1!important;visibility:visible!important}',
      '.wpp-popup{background:#111318;border:1px solid rgba(0,224,255,.15);border-radius:20px;width:90%;max-width:440px;padding:40px 32px 32px;text-align:center;position:relative;transform:translateY(30px) scale(.95);transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .4s ease;box-shadow:0 0 40px rgba(0,224,255,.08),0 25px 60px rgba(0,0,0,.5)}',
      '.wpp-popup-overlay.active .wpp-popup{transform:translateY(0) scale(1)}',
      '.wpp-popup-overlay.closing{background:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;transition:background .4s ease,backdrop-filter .3s ease}',
      '.wpp-popup-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border:none;background:rgba(255,255,255,.06);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,.4);line-height:1;transition:background .2s ease}',
      '.wpp-popup-close:hover{background:rgba(255,255,255,.12);color:#fff}',
      '.wpp-popup-badge{display:inline-block;background:linear-gradient(135deg,#00e0ff 0%,#0090ff 100%);color:#000;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:6px 16px;border-radius:50px;margin-bottom:20px}',
      '.wpp-popup-icon{width:68px;height:68px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;animation:wpp-pulse 2s ease-in-out infinite}',
      '.wpp-popup-icon svg{width:38px;height:38px;fill:#fff}',
      '@keyframes wpp-pulse{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.4)}50%{box-shadow:0 0 0 14px rgba(37,211,102,0)}}',
      '.wpp-popup h2{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:12px;line-height:1.3}',
      '.wpp-popup p{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:15px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:28px}',
      '.wpp-popup p strong{color:#00e0ff;font-weight:600}',
      '.wpp-popup-cta{display:inline-flex;align-items:center;gap:10px;background:#25D366;color:#fff;text-decoration:none;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:16px;font-weight:600;padding:14px 32px;border-radius:50px;transition:background .2s ease,transform .2s ease,box-shadow .2s ease;box-shadow:0 4px 20px rgba(37,211,102,.3)}',
      '.wpp-popup-cta:hover{background:#1fb855;transform:translateY(-2px);box-shadow:0 6px 25px rgba(37,211,102,.4)}',
      '.wpp-popup-cta:active{transform:translateY(0)}',
      '.wpp-popup-cta svg{width:22px;height:22px;fill:#fff}',
      '.wpp-popup-dismiss{display:block;margin-top:16px;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:13px;color:rgba(255,255,255,.3);cursor:pointer;border:none;background:none;transition:color .2s ease;width:100%}',
      '.wpp-popup-dismiss:hover{color:rgba(255,255,255,.5)}',
      '.wpp-fab{position:fixed!important;bottom:24px!important;right:24px!important;width:60px;height:60px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2147483646!important;cursor:pointer;text-decoration:none;box-shadow:0 4px 15px rgba(37,211,102,.4);transition:transform .3s ease,box-shadow .3s ease,opacity .3s ease,visibility .3s ease;animation:wpp-pulse 2s ease-in-out infinite;opacity:0;visibility:hidden;transform:scale(0)}',
      '.wpp-fab.visible{opacity:1!important;visibility:visible!important;transform:scale(1)!important}',
      '.wpp-fab:hover{transform:scale(1.1)!important;box-shadow:0 6px 20px rgba(37,211,102,.5)}',
      '.wpp-fab svg{width:32px;height:32px;fill:#fff}',
      '.wpp-fab-label{position:fixed!important;bottom:36px!important;right:92px!important;background:#111318;border:1px solid rgba(0,224,255,.15);color:#fff;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;white-space:nowrap;z-index:2147483645!important;opacity:0;transform:translateX(20px);pointer-events:none}',
      '.wpp-fab.visible~.wpp-fab-label{animation:fab-label-slide 5s ease-in-out 1s infinite}',
      '@keyframes fab-label-slide{0%,100%{opacity:0;transform:translateX(20px)}12%,60%{opacity:1;transform:translateX(0)}75%{opacity:0;transform:translateX(20px)}}',
      '@media(max-width:480px){.wpp-popup{width:94%;padding:32px 20px 24px;border-radius:16px}.wpp-popup-icon{width:56px;height:56px;margin-bottom:16px}.wpp-popup-icon svg{width:30px;height:30px}.wpp-popup-badge{font-size:10px;padding:5px 12px;margin-bottom:16px}.wpp-popup h2{font-size:19px}.wpp-popup p{font-size:14px;margin-bottom:22px}.wpp-popup-cta{font-size:15px;padding:12px 26px;width:100%;box-sizing:border-box;justify-content:center}.wpp-fab{bottom:16px!important;right:16px!important;width:54px;height:54px}.wpp-fab svg{width:28px;height:28px}.wpp-fab-label{bottom:25px!important;right:78px!important;font-size:12px;padding:6px 12px}}'
    ].join('');
    document.head.appendChild(s);

    // Cria overlay do popup
    var overlay = document.createElement('div');
    overlay.className = 'wpp-popup-overlay';
    overlay.id = 'wppPopup';
    overlay.innerHTML = '<div class="wpp-popup">' +
      '<button class="wpp-popup-close" id="wppClose" aria-label="Fechar">&times;</button>' +
      '<span class="wpp-popup-badge">Novidade 2026</span>' +
      '<div class="wpp-popup-icon">' + WPP_SVG + '</div>' +
      '<h2>Voc\u00ea ganhou um estrategista especializado</h2>' +
      '<p>Se deseja um <strong>profissional</strong> na \u00e1rea te <strong>auxiliando</strong> e <strong>aconselhando</strong> exclusivamente para a sua situa\u00e7\u00e3o atual, basta o chamar pelo seu contato oficial.</p>' +
      '<a class="wpp-popup-cta" id="wppCta" href="' + WPP_URL + '" target="_blank" rel="noopener noreferrer">' + WPP_SVG + ' Falar com estrategista exclusivo</a>' +
      '<button class="wpp-popup-dismiss" id="wppDismiss">N\u00e3o, obrigado</button>' +
      '</div>';
    document.body.appendChild(overlay);

    // Cria FAB
    var fab = document.createElement('a');
    fab.className = 'wpp-fab';
    fab.id = 'wppFab';
    fab.href = WPP_URL;
    fab.target = '_blank';
    fab.rel = 'noopener noreferrer';
    fab.setAttribute('aria-label', 'WhatsApp');
    fab.innerHTML = WPP_SVG;
    document.body.appendChild(fab);

    // Cria label do FAB
    var fabLabel = document.createElement('span');
    fabLabel.className = 'wpp-fab-label';
    fabLabel.textContent = 'Fale com seu estrategista';
    document.body.appendChild(fabLabel);

    var popupCard = overlay.querySelector('.wpp-popup');

    // Se já fechou antes, mostra direto o botão flutuante
    if (sessionStorage.getItem(STORAGE_KEY)) {
      fab.classList.add('visible');
      return;
    }

    // Mostra o popup após o delay
    setTimeout(function () {
      overlay.classList.add('active');
    }, DELAY_MS);

    function closePopup() {
      fab.style.transition = 'none';
      fab.style.transform = 'scale(1)';

      var fabRect = fab.getBoundingClientRect();
      var popupRect = popupCard.getBoundingClientRect();

      fab.style.transform = '';
      fab.style.transition = '';

      var fabCenterX = fabRect.left + fabRect.width / 2;
      var fabCenterY = fabRect.top + fabRect.height / 2;
      var popupCenterX = popupRect.left + popupRect.width / 2;
      var popupCenterY = popupRect.top + popupRect.height / 2;

      var dx = fabCenterX - popupCenterX;
      var dy = fabCenterY - popupCenterY;

      popupCard.style.transition = 'transform 0.65s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease 0.45s, border-radius 0.4s ease';
      popupCard.style.transform = 'translate(' + dx + 'px, ' + dy + 'px) scale(0.05)';
      popupCard.style.opacity = '0';
      popupCard.style.borderRadius = '50%';

      overlay.classList.add('closing');
      sessionStorage.setItem(STORAGE_KEY, '1');

      setTimeout(function () {
        overlay.classList.remove('active');
        overlay.style.display = 'none';
        fab.classList.add('visible');
      }, 700);
    }

    document.getElementById('wppClose').addEventListener('click', closePopup);
    document.getElementById('wppDismiss').addEventListener('click', closePopup);

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closePopup();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closePopup();
    });

    document.getElementById('wppCta').addEventListener('click', function () {
      sessionStorage.setItem(STORAGE_KEY, '1');
    });
  }

  // Aguarda o DOM estar pronto e a Cademi ter terminado
  if (document.readyState === 'complete') {
    setTimeout(init, 300);
  } else {
    window.addEventListener('load', function () {
      setTimeout(init, 300);
    });
  }
})();
</script>
